# search-policy.example.yaml
# ─────────────────────────────────────────
# 这是一份样板配置，展示 rules/search-policy.yaml 的推荐结构。
# 客户使用时：
#   1. 复制本文件为 rules/search-policy.yaml
#   2. 按本企业实际情况调整知识库目录、支持格式、兜底话术
#   3. 调整完后由 HR-OC 评审一次再上线
#
# 维护方：客户（HR-OC）
# 我方仅提供本样板，不维护实际运行文件
# ─────────────────────────────────────────

version: 1.0
last_updated: 2026-05-15
maintainer: HR-OC

# ─────────────────────────────────────────
# 1. 本地知识库范围
# ─────────────────────────────────────────
knowledge_roots:
  - knowledge/

supported_formats:
  - docx
  - pdf
  - xlsx
  - md
  - txt

# ─────────────────────────────────────────
# 2. FAQ 表格约定
# ─────────────────────────────────────────
faq_file: knowledge/faq.xlsx
faq_required_columns:
  - question
  - answer
  - source

# ─────────────────────────────────────────
# 3. 引用与冲突处理
# ─────────────────────────────────────────
citation_style: 文档名 + 章节/标题 + 生效日期/版本号

conflict_resolution:
  strategy: prefer_latest_effective_date_in_document
  if_undecidable: 标注冲突并建议 HR 人工确认

# ─────────────────────────────────────────
# 4. 无命中兜底
# ─────────────────────────────────────────
no_hit_response: 知识库未检索到支持依据，需 HR 确认或补充文档

# ─────────────────────────────────────────
# 5. 后续分区预留
# ─────────────────────────────────────────
future_partitioning:
  enabled: false
  desc: 后续如需按 HR 岗位、区域、业务线或主题分区问答，可在此扩展；V0.2 不启用权限分区。
